name: PHP CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:

  # ─────────────────────────────────────────────
  # 1. Build & Validate (PHP 8.1 – 8.4)
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_mysql, json, curl, gd, intl
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-

      - name: Update lock file
        run: composer update --lock

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP Lint
        run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  # ─────────────────────────────────────────────
  # 2. Build PHP 8.5 (experimentell, blockiert nicht)
  # ─────────────────────────────────────────────
  build-experimental:
    name: "experimental build (8.5)"
    if: false  # Pausiert – Zeile entfernen zum Reaktivieren
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_mysql, json, curl, gd, intl
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.5-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-

      - name: Update lock file
        run: composer update --lock

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP Lint
        run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  # ─────────────────────────────────────────────
  # 3. Security Audit
  # ─────────────────────────────────────────────
  security-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check for known vulnerabilities
        id: audit
        run: |
          set +e
          composer audit 2>&1 | tee audit-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Save audit result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-result
          path: audit-output.txt
          retention-days: 1

  # ─────────────────────────────────────────────
  # 4. PHPStan – Statische Analyse
  # ─────────────────────────────────────────────
  phpstan:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !cancelled() }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, json, curl, gd, intl

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # Inline-Annotations in geänderten Dateien im PR-Diff
      - name: PHPStan – Inline Annotations
        run: vendor/bin/phpstan analyse --no-progress --error-format=github || true

      # JSON-Output für den PR-Kommentar
      - name: PHPStan – Report generieren
        id: phpstan
        run: |
          set +e
          vendor/bin/phpstan analyse --no-progress --error-format=json > phpstan-result.json 2>/dev/null
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Save PHPStan result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-result
          path: phpstan-result.json
          retention-days: 1

  # ─────────────────────────────────────────────
  # 5. PR Report – Zusammenfassung aller Checks
  # ─────────────────────────────────────────────
  pr-report:
    runs-on: ubuntu-latest
    needs: [build, security-audit, phpstan]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Generate bot token
        id: bot
        uses: actions/create-github-app-token@v3
        with:
          app_id: ${{ secrets.BOT_APP_ID }}
          private_key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Collect PR stats
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate PR report
        id: report
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.bot.outputs.token }}
          script: |
            const fs = require('fs');

            // ── Collect results ──
            const buildResult = '${{ needs.build.result }}';
            const auditResult = '${{ needs.security-audit.result }}';
            const phpstanResult = '${{ needs.phpstan.result }}';

            const statusIcon = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const statusText = (r) => r === 'success' ? 'Bestanden' : r === 'skipped' ? 'Übersprungen' : 'Fehlgeschlagen';

            // ── PR diff stats ──
            let diffStats = '';
            try {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              diffStats = `**${pr.changed_files}** Dateien geändert · \`+${pr.additions}\` \`-${pr.deletions}\``;
            } catch { diffStats = ''; }

            // ── PHPStan details ──
            let phpstanSection = '';
            try {
              const json = JSON.parse(fs.readFileSync('phpstan-result.json', 'utf8'));
              const totalErrors = json.totals?.file_errors || 0;

              if (totalErrors === 0) {
                phpstanSection = '> Keine Fehler gefunden.';
              } else {
                const files = json.files || {};
                const fileCount = Object.keys(files).length;
                const workspacePrefix = process.env.GITHUB_WORKSPACE ? process.env.GITHUB_WORKSPACE + '/' : '';
                const shortPath = (p) => workspacePrefix ? p.replace(workspacePrefix, '') : p;

                phpstanSection = `> **${totalErrors} Fehler** in ${fileCount} Dateien\n\n`;
                phpstanSection += '| Datei | Zeile | Beschreibung |\n';
                phpstanSection += '|-------|------:|--------------|\n';

                let shown = 0;
                for (const [filePath, data] of Object.entries(files)) {
                  for (const msg of data.messages) {
                    if (shown >= 15) break;
                    const desc = msg.message.replace(/\|/g, '\\|').substring(0, 120);
                    phpstanSection += `| \`${shortPath(filePath).split('/').pop()}\` | ${msg.line} | ${desc} |\n`;
                    shown++;
                  }
                  if (shown >= 15) break;
                }

                if (totalErrors > 15) {
                  phpstanSection += `\n*… und ${totalErrors - 15} weitere Fehler*`;
                }
              }
            } catch {
              phpstanSection = phpstanResult === 'success'
                ? '> Keine Fehler gefunden.'
                : '> Ergebnis konnte nicht geladen werden.';
            }

            // ── Security audit details ──
            let auditSection = '';
            try {
              const auditText = fs.readFileSync('audit-output.txt', 'utf8').trim();
              if (auditResult === 'success') {
                auditSection = '> Keine bekannten Schwachstellen.';
              } else {
                auditSection = '```\n' + auditText.substring(0, 500) + '\n```';
              }
            } catch {
              auditSection = auditResult === 'success'
                ? '> Keine bekannten Schwachstellen.'
                : '> Ergebnis konnte nicht geladen werden.';
            }

            // ── Build comment ──
            const allPassed = buildResult === 'success' && auditResult === 'success' && phpstanResult === 'success';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            let body = '<!-- ci-report -->\n';
            body += allPassed
              ? '## ✅ Alle Checks bestanden\n\n'
              : '## ⚠️ CI-Report\n\n';

            if (diffStats) body += diffStats + '\n\n';

            body += '### Übersicht\n\n';
            body += '| Check | Status |\n';
            body += '|-------|--------|\n';
            body += `| Build (PHP 8.1 – 8.4) | ${statusIcon(buildResult)} ${statusText(buildResult)} |\n`;
            body += `| Security Audit | ${statusIcon(auditResult)} ${statusText(auditResult)} |\n`;
            body += `| PHPStan (Level 6) | ${statusIcon(phpstanResult)} ${statusText(phpstanResult)} |\n`;

            body += '\n---\n\n';

            // PHPStan details
            body += '<details>\n';
            body += `<summary><strong>PHPStan – Statische Analyse</strong> ${statusIcon(phpstanResult)}</summary>\n\n`;
            body += phpstanSection + '\n\n';
            body += '</details>\n\n';

            // Security details
            body += '<details>\n';
            body += `<summary><strong>Security Audit</strong> ${statusIcon(auditResult)}</summary>\n\n`;
            body += auditSection + '\n\n';
            body += '</details>\n\n';

            body += `---\n*[Workflow-Log ansehen](${runUrl})*`;

            // ── Replace old comment ──
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Delete both old formats
            for (const marker of ['<!-- phpstan-report -->', '<!-- ci-report -->']) {
              const old = comments.find(c => c.body?.includes(marker));
              if (old) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: old.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if checks failed
        if: always()
        run: |
          if [ "${{ needs.phpstan.result }}" = "failure" ]; then exit 1; fi
          if [ "${{ needs.build.result }}" = "failure" ]; then exit 1; fi
