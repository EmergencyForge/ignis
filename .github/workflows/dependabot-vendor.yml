name: Update vendor directory for Dependabot PRs

on:
  pull_request:
    paths:
      - 'composer.json'
      - 'composer.lock'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-vendor:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Check for vendor changes
        id: check
        run: |
          if [ -n "$(git status vendor/ --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated vendor
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vendor/
          git commit -m "chore: update vendor directory for dependency update"
          git push
