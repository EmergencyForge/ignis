name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate bot token
        id: bot
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.bot.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Extract version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Update version.json and push to main
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')
          mkdir -p storage
          cat > storage/version.json << EOF
          {
            "version": "${{ env.version }}",
            "updated_at": "$TIMESTAMP",
            "build_number": "$GITHUB_RUN_NUMBER",
            "commit_hash": "$GITHUB_SHA"
          }
          EOF

          git config user.name "ef-sparky[bot]"
          git config user.email "${{ secrets.BOT_APP_ID }}+ef-sparky[bot]@users.noreply.github.com"
          git add storage/version.json
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update version.json to ${{ env.version }}"
            git push origin HEAD:main
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Create .env.example if missing
        run: |
          if [ ! -f .env.example ]; then
            cat > .env.example << 'ENVEOF'
          DB_HOST=localhost
          DB_USER=root
          DB_PASS=
          DB_NAME=intrarp
          APP_ENV=production
          ENVEOF
          fi

      - name: Build release ZIP
        run: |
          ARCHIVE_NAME="ignis-${{ env.version }}.zip"
          ARCHIVE_LEGACY="intraRP-${{ env.version }}.zip"

          # Exclude-Liste — kategorisiert.
          #
          # WICHTIG: Folgende Pfade MÜSSEN im Release bleiben (nicht excluden!):
          #   - database/migrations/*  → AutoMigrator führt diese beim ersten Request aus
          #   - database/seeds/*       → Initialdaten (Rollen, Permissions, ...)
          #   - phinx.php              → Phinx-Config (vom AutoMigrator geladen)
          #   - tools/db-migrate.php   → wird von composer.json post-install-cmd aufgerufen
          #   - .htaccess              → Routing
          #   - config/, src/, assets/, templates/, api/, alle Modul-Ordner
          #   - composer.json/.lock, nginx.conf.example, README.md, LICENSE
          #   - .env.example
          zip -r "$ARCHIVE_NAME" . \
            `# — Git / VCS —` \
            -x ".git/*" \
            -x ".gitignore" \
            -x ".gitattributes" \
            -x ".github/*" \
            `# — Editor / IDE / AI-Tooling —` \
            -x ".vscode/*" \
            -x ".idea/*" \
            -x ".qodo/*" \
            -x ".claude/*" \
            -x "CLAUDE.md" \
            -x ".impeccable.md" \
            `# — Environment-Files (KEEP .env.example!) —` \
            -x ".env" \
            -x ".env.test" \
            -x ".env.testing" \
            `# — Test-Infrastruktur —` \
            -x "tests/*" \
            -x "phpunit.xml" \
            -x "phpunit.xml.dist" \
            -x ".phpunit.cache/*" \
            -x ".phpunit.result.cache" \
            `# — Static Analysis —` \
            -x "phpstan.neon" \
            -x "phpstan.neon.dist" \
            -x ".phpstan.cache/*" \
            `# — Docker (Dev-Infra, kein offizieller Install-Pfad) —` \
            -x "docker/*" \
            -x "docker-compose.yml" \
            -x "docker-compose.*.yml" \
            -x "Dockerfile" \
            -x "Dockerfile.*" \
            -x ".dockerignore" \
            `# — Dev-Tools (db-migrate.php MUSS drin bleiben — composer post-install) —` \
            -x "scripts/*" \
            `# — Runtime-Artefakte (sicherheitshalber, auch wenn via .gitignore) —` \
            -x "php_errors.log" \
            -x "support_errors.log" \
            -x "storage/logs/*" \
            -x "storage/cache/*" \
            -x "storage/documents/*.pdf" \
            -x "storage/profile-pictures/*" \
            -x "uploads/*" \
            `# — Preview / Design-Dateien —` \
            -x "*preview*.html" \
            -x "_preview*.html" \
            `# — Sonstiges / Backups —` \
            -x "*.backup" \
            -x "*.bak" \
            -x "intrap" \
            `# — Dev-Pakete als Safety-Net (redundant zu --no-dev, aber defense-in-depth) —` \
            -x "vendor/phpstan/*" \
            -x "vendor/phpunit/*" \
            -x "vendor/myclabs/*" \
            -x "vendor/phar-io/*" \
            -x "vendor/sebastian/*" \
            -x "vendor/theseer/*" \
            -x "vendor/mockery/*" \
            -x "vendor/nikic/php-parser/test/*"

          # Legacy-Alias für Installationen, die noch das alte Asset-Namensschema erwarten.
          cp "$ARCHIVE_NAME" "$ARCHIVE_LEGACY"

          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_ENV
          echo "archive_legacy=$ARCHIVE_LEGACY" >> $GITHUB_ENV
          echo "archive_size=$(du -h "$ARCHIVE_NAME" | cut -f1)" >> $GITHUB_ENV

      # Install-Package: setup.php aus dem Setup-Repo + das App-Archiv +
      # eine Kurzanleitung, zusammen als eigenes ZIP. Das Setup erkennt das
      # danebenliegende Archiv und entpackt es lokal statt von GitHub zu
      # laden — für Erstinstallationen ohne curl/allow_url_fopen und ohne
      # Umweg über die Release-Seite.
      - name: Build install package
        run: |
          INSTALL_NAME="ignis-${{ env.version }}-install.zip"
          mkdir install-package
          cp "${{ env.archive_name }}" install-package/

          curl -fsSL -o install-package/setup.php \
            https://raw.githubusercontent.com/EmergencyForge/ignis-setup/main/setup.php
          php -l install-package/setup.php

          cat > install-package/readme.txt << EOF
          ignis ${{ env.version }} — Installationspaket
          =============================================

          Inhalt dieses Pakets:

            setup.php                    der Installationsassistent
            ${{ env.archive_name }}     die Anwendung (wird vom Assistenten entpackt)
            readme.txt                   diese Anleitung

          So installierst du ignis:

          1. Lade setup.php UND ${{ env.archive_name }} unverändert in das
             Zielverzeichnis auf deinem Webspace hoch — dorthin, wo ignis laufen
             soll (z. B. das Hauptverzeichnis deiner Domain).
             Wichtig: Das ZIP nicht selbst entpacken, das übernimmt der Assistent.

          2. Rufe setup.php im Browser auf:
             https://deine-domain.de/setup.php

          3. Folge dem Assistenten. Er prüft die Server-Anforderungen, entpackt
             die Anwendung, richtet Datenbank und Konfiguration ein und legt den
             ersten Admin-Zugang an.

          Nach erfolgreichem Abschluss räumt das Setup selbst auf:
          ZIP-Archiv, readme.txt und setup.php werden automatisch gelöscht.

          Voraussetzungen: PHP 8.3 oder neuer (u. a. mit zip- und pdo_mysql-
          Erweiterung), MySQL- oder MariaDB-Datenbank, Apache oder nginx.

          Fragen oder Probleme? https://github.com/EmergencyForge/ignis
          EOF

          (cd install-package && zip -q -r "../$INSTALL_NAME" .)
          echo "install_name=$INSTALL_NAME" >> $GITHUB_ENV

      - name: Integrity check (SHA256)
        run: |
          CHECKSUM=$(sha256sum "${{ env.archive_name }}" | cut -d' ' -f1)
          echo "checksum=$CHECKSUM" >> $GITHUB_ENV
          echo "$CHECKSUM  ${{ env.archive_name }}" > "${{ env.archive_name }}.sha256"
          echo "$CHECKSUM  ${{ env.archive_legacy }}" > "${{ env.archive_legacy }}.sha256"

          INSTALL_CHECKSUM=$(sha256sum "${{ env.install_name }}" | cut -d' ' -f1)
          echo "$INSTALL_CHECKSUM  ${{ env.install_name }}" > "${{ env.install_name }}.sha256"

          sha256sum -c "${{ env.archive_name }}.sha256"
          sha256sum -c "${{ env.archive_legacy }}.sha256"
          sha256sum -c "${{ env.install_name }}.sha256"
          echo "Integrity OK: $CHECKSUM"

          FILE_COUNT=$(unzip -l "${{ env.archive_name }}" | tail -1 | awk '{print $2}')
          echo "file_count=$FILE_COUNT" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.archive_name }}
            ${{ env.archive_name }}.sha256
            ${{ env.archive_legacy }}
            ${{ env.archive_legacy }}.sha256
            ${{ env.install_name }}
            ${{ env.install_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ steps.bot.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Discord notification (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SHORT_HASH=$(echo "${{ env.checksum }}" | cut -c1-12)
          jq -n \
            --arg title "Release ${{ env.version }} wurde veröffentlicht" \
            --arg name "$RELEASE_NAME" \
            --arg body "$(echo "$RELEASE_BODY" | head -c 500)" \
            --arg url "$RELEASE_URL" \
            --arg version "${{ env.version }}" \
            --arg size "${{ env.archive_size }}" \
            --arg files "${{ env.file_count }}" \
            --arg build "#${{ github.run_number }}" \
            --arg checksum "$SHORT_HASH" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{
              title: $title,
              description: ("**" + $name + "**\n\n" + $body),
              color: 3066993,
              url: $url,
              fields: [
                {name: "Version", value: ("`" + $version + "`"), inline: true},
                {name: "ZIP-Größe", value: ("`" + $size + "`"), inline: true},
                {name: "Dateien", value: $files, inline: true},
                {name: "Build", value: $build, inline: true},
                {name: "SHA256", value: ("`" + $checksum + "…`"), inline: true}
              ],
              footer: {text: "ıgnıs Release Build — Integrität verifiziert ✓"},
              timestamp: $ts
            }]}' | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n \
            --arg version "${{ env.version }}" \
            --arg ref "${{ github.ref }}" \
            --arg url "$RUN_URL" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{
              title: "Release Build fehlgeschlagen",
              description: ("Der Build für **" + (if $version != "" then $version else $ref end) + "** ist fehlgeschlagen.\n\n[Build-Log ansehen](" + $url + ")"),
              color: 15158332,
              footer: {text: "ıgnıs Release Build"},
              timestamp: $ts
            }]}' | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
