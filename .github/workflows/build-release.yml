name: Build Release ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Generate version.json
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')
          cat > system/updates/version.json << EOF
          {
            "version": "$VERSION",
            "updated_at": "$TIMESTAMP",
            "build_number": "$GITHUB_RUN_NUMBER",
            "commit_hash": "$GITHUB_SHA"
          }
          EOF

      - name: Create .env.example if missing
        run: |
          if [ ! -f .env.example ]; then
            cat > .env.example << 'EOF'
          DB_HOST=localhost
          DB_USER=root
          DB_PASS=
          DB_NAME=intrarp
          APP_ENV=production
          EOF
          fi

      - name: Build release ZIP
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE_NAME="intraRP-${VERSION}.zip"

          zip -r "$ARCHIVE_NAME" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x ".env" \
            -x ".vscode/*" \
            -x ".idea/*" \
            -x ".qodo/*" \
            -x ".claude/*" \
            -x ".phpunit.cache/*" \
            -x "tests/*" \
            -x "phpstan.neon" \
            -x "CLAUDE.md" \
            -x ".impeccable.md" \
            -x "*.backup" \
            -x "intrap" \
            -x "*preview*.html" \
            -x "vendor/phpstan/*" \
            -x "vendor/phpunit/*" \
            -x "vendor/myclabs/*" \
            -x "vendor/phar-io/*" \
            -x "vendor/sebastian/*" \
            -x "vendor/theseer/*"

          ARCHIVE_SIZE=$(du -h "$ARCHIVE_NAME" | cut -f1)
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_ENV
          echo "archive_size=$ARCHIVE_SIZE" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "Built $ARCHIVE_NAME ($ARCHIVE_SIZE)"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discord notification (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg title "Release ${{ env.version }} wurde veröffentlicht" \
            --arg name "$RELEASE_NAME" \
            --arg body "$(echo "$RELEASE_BODY" | head -c 500)" \
            --arg url "$RELEASE_URL" \
            --arg version "${{ env.version }}" \
            --arg size "${{ env.archive_size }}" \
            --arg build "#${{ github.run_number }}" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{
              title: $title,
              description: ("**" + $name + "**\n\n" + $body),
              color: 3066993,
              url: $url,
              fields: [
                {name: "Version", value: ("`" + $version + "`"), inline: true},
                {name: "ZIP-Größe", value: ("`" + $size + "`"), inline: true},
                {name: "Build", value: $build, inline: true}
              ],
              footer: {text: "intraRP Release Build"},
              timestamp: $ts
            }]}' | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n \
            --arg version "${{ env.version }}" \
            --arg ref "${{ github.ref }}" \
            --arg url "$RUN_URL" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{
              title: "Release Build fehlgeschlagen",
              description: ("Der Build für **" + (if $version != "" then $version else $ref end) + "** ist fehlgeschlagen.\n\n[Build-Log ansehen](" + $url + ")"),
              color: 15158332,
              footer: {text: "intraRP Release Build"},
              timestamp: $ts
            }]}' | curl -s -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
